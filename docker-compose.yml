services:
  postgres:
    image: postgres:16-alpine
    container_name: haddon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: haddon
      POSTGRES_USER: haddon
      POSTGRES_PASSWORD: haddon
    ports:
      - "5433:5432"
    volumes:
      - haddon-postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: haddon-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - haddon-minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do
        sleep 1;
      done;
      mc mb --ignore-existing local/haddon-books;
      exit 0;
      "

volumes:
  haddon-postgres-data:
  haddon-minio-data:
